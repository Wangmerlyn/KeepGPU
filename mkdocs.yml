site_name: KeepGPU
site_url: https://keepgpu.readthedocs.io
repo_url: https://github.com/Wangmerlyn/KeepGPU
repo_name: Wangmerlyn/KeepGPU
edit_uri: blob/main/docs/

exclude_docs: |
  plans/**
  skills/**

theme:
  name: material
  features:
    - navigation.instant
    - content.code.copy
    - navigation.tabs

nav:
  - Overview:
      - Welcome: index.md
      - Getting Started: getting-started.md
  - Usage:
      - CLI Playbook: guides/cli.md
      - Python API Recipes: guides/python.md
      - MCP and Service API: guides/mcp.md
  - Concepts:
      - How KeepGPU Works: concepts/architecture.md
  - Reference:
      - CLI Reference: reference/cli.md
      - API Reference: reference/api.md
  - Project:
      - Contributing: contributing.md
      - Citation: citation.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - src

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
